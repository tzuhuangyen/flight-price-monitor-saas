name: Daily Flight Price Monitor

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore sent alerts cache
        uses: actions/cache/restore@v4
        with:
          path: sent_alerts.json
          key: sent-alerts-${{ github.run_id }}
          restore-keys: |
            sent-alerts-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flight monitor
        run: python cron_monitor.py
        env:
          TRAVELPAYOUTS_API_KEY: ${{ secrets.TRAVELPAYOUTS_API_KEY }}
          TRAVELPAYOUTS_MARKER: ${{ secrets.TRAVELPAYOUTS_MARKER }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}

      - name: Save sent alerts cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: sent_alerts.json
          key: sent-alerts-${{ github.run_id }}
